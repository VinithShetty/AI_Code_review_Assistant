worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ── Rate Limiting ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;

    # ── Upstream Definitions ────────────────────────────────────────────
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 16;
    }

    upstream webhook_upstream {
        server webhook:8001;
        keepalive 8;
    }

    # ── Security Headers ────────────────────────────────────────────────
    map $sent_http_content_type $security_headers {
        default "";
        text/html "always";
        application/json "always";
    }

    add_header X-Frame-Options DENY $security_headers;
    add_header X-Content-Type-Options nosniff $security_headers;
    add_header X-XSS-Protection "1; mode=block" $security_headers;
    add_header Referrer-Policy strict-origin-when-cross-origin $security_headers;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.github.com" $security_headers;

    # ── Health Check Endpoint ───────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }
    }

    # ── HTTP → HTTPS Redirect (Production) ─────────────────────────────
    server {
        listen 80;
        server_name code-review.example.com;
        return 301 https://$server_name$request_uri;
    }

    # ── Main Server Block ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name code-review.example.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Frontend (Next.js) ─────────────────────────────────────────
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Next.js HMR WebSocket support
            proxy_read_timeout 86400;
        }

        # ── API (FastAPI Backend) ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://backend_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
        }

        # ── Backend Health ─────────────────────────────────────────────
        location /api/health {
            limit_req zone=general_limit burst=30 nodelay;
            proxy_pass http://backend_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API Docs (Swagger / Redoc) ────────────────────────────────
        location /docs {
            proxy_pass http://backend_upstream/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend_upstream/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── GitHub Webhook Endpoint ────────────────────────────────────
        location /webhook/github {
            limit_req zone=webhook_limit burst=5 nodelay;
            proxy_pass http://webhook_upstream/webhook/github;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
            proxy_read_timeout 30s;
        }

        # ── Static Assets Cache ────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /static/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
    }
}
