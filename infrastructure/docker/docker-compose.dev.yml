version: "3.9"

# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.backend
      target: development
    volumes:
      - ../../backend:/app:cached
      - backend_uploads:/app/uploads
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codereview}:${POSTGRES_PASSWORD:-codereview_secret}@postgres:5432/${POSTGRES_DB:-code_review}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  webhook:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.backend
      target: development
    volumes:
      - ../../backend:/app:cached
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    command: ["uvicorn", "app.webhook_server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  ai-worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.ai-engine
      target: development
    volumes:
      - ../../ai_engine:/app:cached
      - ai_model_cache:/root/.cache
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=debug", "--concurrency=2"]

  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.frontend
      target: development
    volumes:
      - ../../frontend/src:/app/src:cached
      - ../../frontend/public:/app/public:cached
      - ../../frontend/package.json:/app/package.json:cached
      - ../../frontend/next.config.js:/app/next.config.js:cached
      - ../../frontend/tsconfig.json:/app/tsconfig.json:cached
    environment:
      - ENVIRONMENT=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
    command: ["npm", "run", "dev"]

  nginx:
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
