version: "3.9"

services:
  # ── Databases ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: code-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codereview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codereview_secret}
      POSTGRES_DB: ${POSTGRES_DB:-code_review}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codereview}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-net

  mongo:
    image: mongo:7
    container_name: code-review-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-codereview}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-code_review_logs}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: code-review-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  qdrant:
    image: qdrant/qdrant:v1.8.1
    container_name: code-review-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend-net

  # ── Application Services ───────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.backend
    container_name: code-review-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codereview}:${POSTGRES_PASSWORD:-codereview_secret}@postgres:5432/${POSTGRES_DB:-code_review}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend-net

  webhook:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.backend
    container_name: code-review-webhook
    restart: unless-stopped
    command: ["python", "-m", "app.webhook_server"]
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codereview}:${POSTGRES_PASSWORD:-codereview_secret}@postgres:5432/${POSTGRES_DB:-code_review}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend-net

  ai-worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.ai-engine
    container_name: code-review-ai-worker
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codereview}:${POSTGRES_PASSWORD:-codereview_secret}@postgres:5432/${POSTGRES_DB:-code_review}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ai_model_cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    networks:
      - backend-net

  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfiles/Dockerfile.frontend
    container_name: code-review-frontend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXTAUTH_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend-net

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: code-review-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      webhook:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend-net

# ── Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  backend_uploads:
    driver: local
  ai_model_cache:
    driver: local
  nginx_certs:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────
networks:
  backend-net:
    driver: bridge
