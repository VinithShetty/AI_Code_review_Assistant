apiVersion: v1
kind: Namespace
metadata:
  name: code-review-assistant
  labels:
    app.kubernetes.io/name: code-review-assistant
    app.kubernetes.io/part-of: code-review-assistant
    app.kubernetes.io/managed-by: kubectl
    environment: production
  annotations:
    scheduler.alpha.kubernetes.io/defaultTolerations: '[{"operator": "Equal", "effect": "NoSchedule", "key": "dedicated", "value": "code-review"}]'
